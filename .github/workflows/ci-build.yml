name: CI — Build & Syntax

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-check:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax check (AST parse)
        run: python3 .github/scripts/ast_check.py

      - name: Import chain check
        run: python3 .github/scripts/import_check.py
